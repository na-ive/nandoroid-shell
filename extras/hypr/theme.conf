# ─────────────────────────────────────────────────────────────────────────────
#  Nandoroid Shell: Theme & Environment Configuration
#  This file provides the necessary environment variables for Qt/GTK apps
#  to follow the shell's dynamic colors.
# ─────────────────────────────────────────────────────────────────────────────

# --- Theme Engines ---
# For Qt applications (like Dolphin) to follow Matugen colors:
# Option 1: Use qt6ct/qt5ct (Standard for standalone Hyprland)
# - Install 'qt6ct', 'qt5ct', and 'nwg-look'.
# - Set Style to 'Breeze' in qt6ct and qt5ct.
# - Open qt6ct/qt5ct once to initialize settings.
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb

# Option 2: Use KDE integration (Recommended if you have KDE apps)
# - Install 'plasma-integration' and 'breeze'.
# - Uncomment the line below and comment out the qt6ct line above.
# env = QT_QPA_PLATFORMTHEME,kde

# --- Toolkit Backends ---
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- XDG Desktop Portal ---
# Required for correct theme detection and file pickers
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- GTK & Icon Scaling ---
# Optional: force specific cursor size
# env = XCURSOR_SIZE,24
# env = HYPRCURSOR_SIZE,24

# ─────────────────────────────────────────────────────────────────────────────
#  Initial Theming Hook
# ─────────────────────────────────────────────────────────────────────────────

# Ensure GTK applications start with the correct theme preference
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
