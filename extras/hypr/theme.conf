# ─────────────────────────────────────────────────────────────────────────────
#  Nandoroid Shell: Theme & Environment Configuration
#  This file provides the necessary environment variables for Qt/GTK apps
#  to follow the shell's dynamic colors.
# ─────────────────────────────────────────────────────────────────────────────

# --- Theme Engines ---
# Use qt6ct/qt5ct to manage Qt appearance. 
# Make sure you have 'qt6ct' and 'qt5ct' installed.
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb

# --- Toolkit Backends ---
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- XDG Desktop Portal ---
# Required for correct theme detection and file pickers
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- GTK & Icon Scaling ---
# Optional: force specific cursor size if needed
# env = XCURSOR_SIZE,24
# env = HYPRCURSOR_SIZE,24

# ─────────────────────────────────────────────────────────────────────────────
#  Initial Theming Hook
# ─────────────────────────────────────────────────────────────────────────────

# Ensure GTK applications start with the correct theme preference
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk-theme'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
