# ─────────────────────────────────────────────────────────────────────────────
#  Nandoroid Shell: Main Hyprland Configuration
# ─────────────────────────────────────────────────────────────────────────────

# --- Source Modular Configs ---
# Using relative paths for portability
source = ./configs/env.conf
source = ./configs/execs.conf
source = ./configs/general.conf
source = ./configs/rules.conf

# --- Source Nandoroid Shell Keybinds & Rules ---
# This is usually in ~/.config/hypr/nandoroid/
source = ~/.config/hypr/nandoroid/nandoroid.conf

# --- Monitors ---
monitor=,preferred,auto,1
