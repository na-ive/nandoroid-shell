# --- Window Rules ---
# Using ONLY standard windowrule (v1) syntax as requested

# Dialogs & File Pickers
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Select a File)(.*)$
windowrule = float, title:^(Choose wallpaper)(.*)$
windowrule = float, title:^(Open Folder)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Library)(.*)$
windowrule = float, title:^(File Upload)(.*)$

windowrule = center, title:^(Open File)(.*)$
windowrule = center, title:^(Select a File)(.*)$
windowrule = center, title:^(Choose wallpaper)(.*)$
windowrule = center, title:^(Open Folder)(.*)$
windowrule = center, title:^(Save As)(.*)$
windowrule = center, title:^(Library)(.*)$
windowrule = center, title:^(File Upload)(.*)$

# System Tools
windowrule = float, pavucontrol
windowrule = float, org.pulseaudio.pavucontrol
windowrule = float, nm-connection-editor
windowrule = float, blueberry.py

windowrule = center, pavucontrol
windowrule = center, org.pulseaudio.pavucontrol
windowrule = center, nm-connection-editor

# Portals
windowrule = float, xdg-desktop-portal-gtk
windowrule = float, xdg-desktop-portal-hyprland
windowrule = float, org.freedesktop.impl.portal.desktop.kde

# Picture-in-Picture
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$

# NAnDoroid Panels (Fallback native floating)
windowrule = float, title:^(Settings)$
windowrule = float, title:^(System Monitor)$
windowrule = center, title:^(Settings)$
windowrule = center, title:^(System Monitor)$
