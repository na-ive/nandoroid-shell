# --- Window Rules ---
# Standard Hyprland windowrule syntax (Following examples)

# Dialogs & File Pickers
windowrule = float, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)$
windowrule = center, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)$

# System Tools
windowrule = float, pavucontrol
windowrule = float, org.pulseaudio.pavucontrol
windowrule = float, nm-connection-editor
windowrule = float, blueberry.py

windowrule = center, pavucontrol
windowrule = center, org.pulseaudio.pavucontrol
windowrule = center, nm-connection-editor

# Picture-in-Picture
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$

# Portals
windowrule = float, xdg-desktop-portal-gtk
windowrule = float, xdg-desktop-portal-hyprland
windowrule = float, org.freedesktop.impl.portal.desktop.kde
