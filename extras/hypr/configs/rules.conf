# --- Window Rules ---
# Standard Hyprland windowrulev2 syntax 
# Merged with user latest custom preferences

# --- Dialogs & File Pickers ---
windowrulev2 = float, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
windowrulev2 = center, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$

# --- System Tools ---
windowrulev2 = float, class:^(pavucontrol|org.pulseaudio.pavucontrol|nm-connection-editor|blueberry.py)$
windowrulev2 = center, class:^(pavucontrol|org.pulseaudio.pavucontrol|nm-connection-editor)$
windowrulev2 = size 45% 45%, class:^(pavucontrol|org.pulseaudio.pavucontrol|nm-connection-editor)$

# --- XDG Portals ---
windowrulev2 = float, class:^(org.freedesktop.impl.portal.desktop.kde|xdg-desktop-portal-gtk|xdg-desktop-portal-hyprland|hyprland-share-picker)$
windowrulev2 = center, class:^(hyprland-share-picker)$
windowrulev2 = size 600 400, class:^(hyprland-share-picker)$

# --- Vesktop & Messaging ---
windowrulev2 = float, class:^(vesktop)$, title:^(.*Share.*|.*Select.*|.*PipeWire.*)$
windowrulev2 = center, class:^(vesktop)$, title:^(.*Share.*|.*Select.*|.*PipeWire.*)$

# --- Picture-in-Picture ---
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

# --- NAnDoroid Panels (Fallback native floating) ---
windowrulev2 = float, title:^(Settings|System Monitor)$
windowrulev2 = center, title:^(Settings|System Monitor)$

# --- XWayland Specific ---
windowrulev2 = noblur, class:^()$, title:^()$
windowrulev2 = noblur, xwayland:1
