# ─────────────────────────────────────────────────────────────────────────────
#  Nandoroid Shell: Keybinds & Layer Rules
#  Sourced automatically by hyprland.conf
# ─────────────────────────────────────────────────────────────────────────────

$nandoroid = qs -c nandoroid ipc call
$scripts = ~/.config/quickshell/nandoroid/scripts

# Start Nandoroid Shell
exec-once = quickshell -c nandoroid

# ─────────────────────────────────────────────────────────────────────────────
#  Unbinds (Prevent conflicts with default configs)
# ─────────────────────────────────────────────────────────────────────────────

unbind = Super, Q
unbind = Super, T
unbind = Super, Return
unbind = Super, Enter
unbind = Super, W
unbind = Super, E
unbind = Ctrl+Alt, Delete
unbind = XF86MonBrightnessUp
unbind = XF86MonBrightnessDown
unbind = Super, Period
unbind = Super, V
unbind = Super+Shift, S
unbind = Super+Shift, R
unbind = Super+Shift, X
unbind = Super, Tab

# ─────────────────────────────────────────────────────────────────────────────
#  Default App Binds
# ─────────────────────────────────────────────────────────────────────────────

bind = Super, Q, killactive,
bind = Super, T, exec, $scripts/launch_first_available.sh kitty foot alacritty
bind = Super, Return, exec, $scripts/launch_first_available.sh kitty foot alacritty
bind = Super, Enter, exec, $scripts/launch_first_available.sh kitty foot alacritty
bind = Super, W, exec, $scripts/launch_first_available.sh zen-browser firefox chromium google-chrome-stable
bind = Super, E, exec, $scripts/launch_first_available.sh dolphin nautilus thunar thunar-mobile

# ─────────────────────────────────────────────────────────────────────────────
#  Panel Toggles (via CLI)
# ─────────────────────────────────────────────────────────────────────────────

# Tapping Super opens Spotlight
bindr = Super, Super_L, exec, $nandoroid spotlight toggle

bind = Super, Space, exec, $nandoroid launcher toggle
bind = Super, V, exec, $nandoroid spotlight toggle clipboard
bind = Ctrl+Super, T, exec, $nandoroid quickwallpaper toggle
bind = Super, A, exec, $nandoroid notifications toggle
bind = Super, N, exec, $nandoroid quicksettings toggle
bind = Super, D, exec, $nandoroid dashboard toggle
bind = Super, I, exec, $nandoroid settings toggle
bind = Super, Tab, exec, $nandoroid overview toggle
bind = Super, L, exec, $nandoroid lock activate
bind = Ctrl+Alt, Delete, exec, $nandoroid systemmonitor toggle

# ─────────────────────────────────────────────────────────────────────────────
#  Region Tools (Screenshots & Recording)
# ─────────────────────────────────────────────────────────────────────────────

bind = Super+Shift, S, global, quickshell:regionScreenshot
bindl = Super+Shift, R, global, quickshell:regionRecord
bind = Super+Shift, X, global, quickshell:regionOcr

# ─────────────────────────────────────────────────────────────────────────────
#  Spotlight Specifics
# ─────────────────────────────────────────────────────────────────────────────

bindd = Super, Period, Emoji >> clipboard, global, quickshell:spotlightEmoji
bindd = Super, V, Clipboard history >> clipboard, global, quickshell:spotlightClipboard

# ─────────────────────────────────────────────────────────────────────────────
#  Utility & Power
# ─────────────────────────────────────────────────────────────────────────────

bind = Ctrl+Super, R, exec, $scripts/restartshell.sh

# ─────────────────────────────────────────────────────────────────────────────
#  Brightness & OSD
# ─────────────────────────────────────────────────────────────────────────────

bindle = , XF86MonBrightnessUp, exec, $nandoroid brightness increment
bindle = , XF86MonBrightnessDown, exec, $nandoroid brightness decrement

# ─────────────────────────────────────────────────────────────────────────────
#  Layer Rules (Blur & Animation)
# ─────────────────────────────────────────────────────────────────────────────

# Standard Hyprland Layer Rules
layerrule = blur, ^(quickshell)$
layerrule = ignorealpha 0.5, ^(quickshell)$
layerrule = blur, ^(notifications)$
layerrule = ignorealpha 0.69, ^(notifications)$
layerrule = blur, ^(launcher)$
layerrule = ignorealpha 0.5, ^(launcher)$
layerrule = blur, ^(overview)$
layerrule = blur, ^(session)$
